<mat-toolbar class="app-toolbar">
  <button mat-icon-button class="menu-btn" (click)="menuToggle.emit()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="toolbar-brand">
    <mat-icon>school</mat-icon>
    <span class="toolbar-title">Student Course Portal</span>
  </div>

  <span class="toolbar-spacer"></span>

  <nav class="toolbar-nav">
    <a mat-button routerLink="/">Home</a>
    <a mat-button routerLink="/courses">Courses</a>
    <a mat-button routerLink="/profile">Profile</a>
    <a mat-flat-button color="primary" routerLink="/enroll" class="enroll-btn">
      <mat-icon>add_circle</mat-icon> Enroll
    </a>
  </nav>

  <button mat-icon-button matBadge="3" matBadgeColor="accent" matBadgeSize="small" aria-label="Notifications">
    <mat-icon>notifications</mat-icon>
  </button>
</mat-toolbar>
