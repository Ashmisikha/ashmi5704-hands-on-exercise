<mat-card class="notification-card" @fadeIn>
  <mat-card-header>
    <mat-icon mat-card-avatar class="notif-icon">notifications</mat-icon>
    <mat-card-title>Notifications</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-list>
      <mat-list-item *ngFor="let msg of messages">
        <mat-icon matListItemIcon>info</mat-icon>
        <span matListItemTitle>{{ msg }}</span>
      </mat-list-item>
    </mat-list>
  </mat-card-content>
</mat-card>
