    <p class="brand-sub">Digital Nurture 5.0</p>
  </div>
</div>

<mat-divider></mat-divider>

<mat-nav-list class="nav-list">

    <mat-icon matListItemIcon>dashboard</mat-icon>
    <span matListItemTitle>Dashboard</span>
  </a>
  <a mat-list-item routerLink="/courses" routerLinkActive="active" (click)="onNav()">

  </a>
  <a mat-list-item routerLink="/enroll" routerLinkActive="active" (click)="onNav()">

<mat-divider></mat-divider>

<div class="sidebar-footer">
