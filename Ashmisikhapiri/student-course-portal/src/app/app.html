<mat-sidenav-container class="app-shell">
  <mat-sidenav #sidenav class="app-sidenav" [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="!(isHandset$ | async)">
    <app-sidebar (navigate)="sidenav.close()"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <app-header (menuToggle)="toggleSidenav()"></app-header>

    <main class="page-content" [@routeAnimations]="prepareRoute(outlet)">
      <router-outlet #outlet="outlet"></router-outlet>
    </main>

    <app-footer></app-footer>

    <div class="loading-overlay" *ngIf="loadingService.isLoading$ | async" @fadeIn>
      <mat-spinner diameter="48"></mat-spinner>
      <p>Loading...</p>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
