<div class="page-container" @fadeIn>
  <div class="page-header">
    <h2 class="page-title">Course Listing</h2>
    <p class="page-subtitle">Browse available courses and enroll with one click.</p>
  </div>

  <mat-card class="search-card">
    <mat-card-content>
      <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Filter courses</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [value]="searchTerm" (input)="onSearchChange(($any($event.target)).value)" placeholder="Search by name or code...">
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <div class="loading-state" *ngIf="loading$ | async">
    <mat-spinner diameter="40"></mat-spinner>
    <p><strong>Loading courses...</strong></p>
  </div>

  <mat-card class="error-card" *ngIf="error$ | async as error">
    <mat-card-content>
      <mat-icon color="warn">error</mat-icon>
      <span>{{ error }}</span>
    </mat-card-content>
  </mat-card>

  <ng-container *ngIf="(courses$ | async) as courses; else noCourses">
    <div class="card-grid" *ngIf="!(loading$ | async)">
      <ng-container *ngIf="courses.length; else noCourses">
        <app-course-card
          *ngFor="let course of courses; let i = index; trackBy: trackByCourseId"
          [course]="course"
          [enrolledIds]="currentEnrolledIds"
          (enrollRequested)="onEnroll($event)">
        </app-course-card>
      </ng-container>
    </div>
  </ng-container>

  <mat-card class="selected-card" *ngIf="selectedCourseId">
    <mat-card-content>
      <mat-icon>bookmark</mat-icon>
      <strong>Selected course ID:</strong> {{ selectedCourseId }}
    </mat-card-content>
  </mat-card>

  <ng-template #noCourses>
    <mat-card class="empty-card">
      <mat-card-content>
        <mat-icon>inbox</mat-icon>
        <p class="label-bold">No courses available.</p>
      </mat-card-content>
    </mat-card>
  </ng-template>
</div>
